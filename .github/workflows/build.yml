name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build and verify
        run: ./gradlew clean build --no-daemon --stacktrace
      - name: Verify release JAR
        run: |
          mapfile -t jars < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | sort)
          test "${#jars[@]}" -eq 1
          unzip -t "${jars[0]}"
          unzip -p "${jars[0]}" fabric.mod.json | grep -q '"environment": "client"'
          unzip -l "${jars[0]}" | grep -q 'assets/vitals/lang/en_us.json'
          unzip -l "${jars[0]}" | grep -q 'assets/vitals/lang/zh_cn.json'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft_Vitals-artifacts
          path: build/libs/*.jar
          if-no-files-found: error
