name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build and verify
        run: ./gradlew clean build --no-daemon --stacktrace
      - name: Verify release JAR
        run: |
          mapfile -t jars < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | sort)
          test "${#jars[@]}" -eq 1
          unzip -t "${jars[0]}"
          unzip -p "${jars[0]}" fabric.mod.json | grep -q '"environment": "client"'
          unzip -l "${jars[0]}" | grep -q 'assets/vitals/lang/en_us.json'
          unzip -l "${jars[0]}" | grep -q 'assets/vitals/lang/zh_cn.json'
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0 # v7.0.1
        with:
          name: Minecraft_Vitals-artifacts
          path: build/libs/*.jar
          if-no-files-found: error
