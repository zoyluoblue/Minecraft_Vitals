name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Validate tag version
        shell: bash
        run: |
          version=$(sed -n 's/^mod_version=//p' gradle.properties)
          test "${GITHUB_REF_NAME}" = "v${version}"
      - name: Build and verify
        run: ./gradlew clean build --no-daemon --stacktrace
      - name: Prepare release assets
        shell: bash
        run: |
          mapfile -t main_jars < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | sort)
          mapfile -t source_jars < <(find build/libs -maxdepth 1 -type f -name '*-sources.jar' | sort)
          test "${#main_jars[@]}" -eq 1
          test "${#source_jars[@]}" -eq 1
          unzip -t "${main_jars[0]}"
          unzip -p "${main_jars[0]}" fabric.mod.json | grep -q "\"version\": \"${GITHUB_REF_NAME#v}\""
          shasum -a 256 "${main_jars[0]}" "${source_jars[0]}" > build/libs/SHA256SUMS.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" build/libs/*.jar build/libs/SHA256SUMS.txt \
            --title "Minecraft_Vitals ${GITHUB_REF_NAME}" \
            --generate-notes
